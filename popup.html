<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>YouTube Looper - A-B Repeat & Save Segments</title>
    <style>
      :root {
        --bg: #fff8f5;
        --card: rgba(255, 255, 255, 0.92);
        --border: rgba(146, 34, 13, 0.12);
        --text: #2f1612;
        --muted: #6f554f;
        --accent: #d9481d;
        --accent-strong: #b93813;
        --soft: rgba(217, 72, 29, 0.1);
        --shadow: 0 18px 36px rgba(121, 45, 22, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 320px;
        font-family: "SF Pro Display", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 214, 194, 0.75), transparent 44%),
          linear-gradient(180deg, #fff8f5 0%, #fff2ec 100%);
        color: var(--text);
      }

      .shell {
        padding: 18px;
      }

      .card {
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 18px;
        background: var(--card);
        box-shadow: var(--shadow);
        backdrop-filter: blur(8px);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--soft);
        color: var(--accent-strong);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        margin-bottom: 12px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 22px;
        line-height: 1.2;
        letter-spacing: -0.03em;
      }

      .lead {
        margin: 0;
        font-size: 13px;
        line-height: 1.5;
        color: var(--muted);
      }

      .steps {
        display: grid;
        gap: 10px;
        margin: 16px 0;
      }

      .step {
        display: grid;
        grid-template-columns: 28px 1fr;
        gap: 10px;
        align-items: start;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(146, 34, 13, 0.08);
      }

      .step-index {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: var(--accent);
        color: white;
        font-size: 12px;
        font-weight: 800;
      }

      .step-title {
        margin: 1px 0 4px;
        font-size: 13px;
        font-weight: 700;
      }

      .step-copy {
        margin: 0;
        font-size: 12px;
        line-height: 1.45;
        color: var(--muted);
      }

      button,
      .web-link {
        width: 100%;
        border-radius: 14px;
        padding: 12px 14px;
        font-weight: 800;
        font-size: 14px;
        text-decoration: none;
        transition:
          transform 0.15s ease,
          background 0.15s ease,
          border-color 0.15s ease,
          color 0.15s ease,
          box-shadow 0.15s ease;
      }

      button {
        border: 0;
        background: linear-gradient(180deg, #e85b2f 0%, #cb4018 100%);
        color: white;
        cursor: pointer;
        box-shadow: 0 12px 22px rgba(217, 72, 29, 0.22);
      }

      button:hover {
        transform: translateY(-1px);
        background: linear-gradient(180deg, #ee6840 0%, #cf4318 100%);
      }

      .subcopy {
        margin: 14px 0 8px;
        font-size: 12px;
        line-height: 1.45;
        color: var(--muted);
      }

      .web-link {
        display: block;
        text-align: center;
        border: 1px solid rgba(217, 72, 29, 0.22);
        background: rgba(255, 255, 255, 0.72);
        color: var(--accent-strong);
      }

      .web-link:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.96);
        border-color: rgba(217, 72, 29, 0.34);
      }

      .shortcut-card {
        margin-top: 12px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(47, 22, 18, 0.04);
        border: 1px solid rgba(47, 22, 18, 0.06);
      }

      .shortcut-label {
        margin: 0 0 6px;
        font-size: 11px;
        font-weight: 700;
        color: var(--accent-strong);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .shortcut-copy {
        margin: 0;
        font-size: 12px;
        line-height: 1.45;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="card">
        <div class="badge">AB Loop</div>
        <h1 id="popup-title"></h1>
        <p id="popup-desc" class="lead"></p>

        <div class="steps">
          <div class="step">
            <div class="step-index">1</div>
            <div>
              <p id="step-1-title" class="step-title"></p>
              <p id="step-1-copy" class="step-copy"></p>
            </div>
          </div>
          <div class="step">
            <div class="step-index">2</div>
            <div>
              <p id="step-2-title" class="step-title"></p>
              <p id="step-2-copy" class="step-copy"></p>
            </div>
          </div>
          <div class="step">
            <div class="step-index">3</div>
            <div>
              <p id="step-3-title" class="step-title"></p>
              <p id="step-3-copy" class="step-copy"></p>
            </div>
          </div>
        </div>

        <button id="open-youtube"></button>

        <p id="popup-web-desc" class="subcopy"></p>
        <a id="open-web" class="web-link" href="https://youtube-looper.vercel.app/" target="_blank"></a>

        <div class="shortcut-card">
          <p id="popup-shortcut-label" class="shortcut-label"></p>
          <p id="popup-shortcuts" class="shortcut-copy"></p>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
