<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>YouTube AB Looper</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 16px;
        width: 260px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #ffffff;
        color: #222;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      p {
        margin: 0 0 12px;
        font-size: 13px;
        line-height: 1.5;
        color: #555;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        background: #7c3aed;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        opacity: 0.95;
      }

      .divider {
        height: 1px;
        background: #eee;
        margin: 14px 0;
      }

      .web-desc {
        font-size: 12px;
        color: #888;
      }

      .web-link {
        display: block;
        width: 100%;
        text-align: center;
        border: 1px solid #7c3aed;
        border-radius: 10px;
        padding: 10px 12px;
        background: transparent;
        color: #7c3aed;
        font-weight: 700;
        font-size: 13px;
        text-decoration: none;
        transition: all 0.15s;
      }

      .web-link:hover {
        background: #7c3aed;
        color: white;
      }
    </style>
  </head>
  <body>
    <h1>YouTube AB Looper</h1>
    <p id="popup-desc"></p>
    <button id="open-youtube"></button>

    <div class="divider"></div>
    <p id="popup-web-desc" class="web-desc"></p>
    <a id="open-web" class="web-link" href="https://youtube-looper.vercel.app/" target="_blank"></a>

    <script src="popup.js"></script>
  </body>
</html>
